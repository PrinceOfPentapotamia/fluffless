<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUFFLESS</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="/static/logo.png" alt="Fluffless Logo" id="logo-img">
                <h1>FLUFFLESS</h1>
            </div>
            <p class="subtitle">STOP THE FLUFF. GET THE FACTS.</p>
            <p style="text-align: center; font-size: 0.9rem; color: #888; max-width: 600px; margin: 0 auto; padding-top: 10px;">Instantly summarize long videos, find specific parts, and debunk clickbait titles.</p>
        </header>

        <main>
            <div class="input-section">
                <input type="text" id="youtube-url" placeholder="PASTE YOUTUBE URL HERE" autocomplete="off">
                <button id="process-btn">SUMMARIZE</button>
            </div>
            
            <div id="loading-bar" class="hidden">
                <div class="progress"></div>
                <p id="loading-text">PROCESSING...</p>
            </div>

            <div id="result-section" class="hidden">
                <h2 id="video-title"></h2>
                <div class="debunk-box">
                    <p id="debunk-text"></p>
                </div>
            </div>

            <div id="chat-section" class="hidden">
                <div id="chat-history"></div>
                <div class="chat-input-wrapper">
                    <input type="text" id="chat-input" placeholder="ASK FOLLOW UP...">
                    <button id="chat-btn">→</button>
                </div>
            </div>
        </main>
    </div>
    
    <footer style="text-align: center; margin-top: 3rem; font-size: 0.8rem; color: #555;">
        <a href="https://github.com/PrinceOfPentapotamia/fluffless/blob/master/PRIVACY_POLICY.md" style="color: #888; text-decoration: none;" target="_blank">Privacy Policy</a>
    </footer>

    <script src="/static/script.js"></script>
</body>
</html>
